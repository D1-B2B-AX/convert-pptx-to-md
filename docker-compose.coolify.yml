services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:${N8N_VERSION:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      N8N_HOST: ${N8N_HOST:?N8N_HOST is required}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
      WEBHOOK_URL: ${WEBHOOK_URL:?WEBHOOK_URL is required}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Asia/Seoul}
      TZ: ${TZ:-Asia/Seoul}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_RUNNERS_ENABLED: "true"
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?N8N_ENCRYPTION_KEY is required}
    volumes:
      - n8n-data:/home/node/.n8n
    expose:
      - "5678"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5678/healthz/readiness').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  pptx-md-converter-api:
    build:
      context: .
    restart: unless-stopped
    environment:
      PORT: "8000"
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      API_AUTH_TOKEN: ${API_AUTH_TOKEN:-}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  n8n-data:
    name: ${N8N_DATA_VOLUME:-n8n-data}
